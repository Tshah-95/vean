name: Harness

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: harness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Harness bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VEAN_CI_EVIDENCE_PATH: ${{ runner.temp }}/harness-bootstrap.json
    steps:
      - name: Initialize failure evidence
        run: |
          mkdir -p "$(dirname "$VEAN_CI_EVIDENCE_PATH")"
          printf '%s\n' '{"contract_version":"1.0.0","profile":"bootstrap","status":"failed","reason_code":"CI_BOOTSTRAP_NOT_REACHED"}' > "$VEAN_CI_EVIDENCE_PATH"
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Run policy-defined bootstrap
        run: bun run verify:ci-bootstrap
      - name: Upload structured harness evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harness-bootstrap-${{ github.sha }}
          path: ${{ runner.temp }}/harness-bootstrap.json
          if-no-files-found: error
          retention-days: 7
